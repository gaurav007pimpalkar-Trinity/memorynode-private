# Cloudflare Pages — two projects, one repo (apps/dashboard):
#   memorynode-console → console.memorynode.ai (VITE_APP_SURFACE=console at build time)
#   memorynode-app     → app.memorynode.ai (VITE_APP_SURFACE=app at build time)
#
# Recommended: from repo root, one command builds both surfaces and deploys both (same commit):
#   pnpm dashboard:deploy:pages
# Requires CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, VITE_API_BASE_URL, VITE_SUPABASE_* for console build.
#
# Legacy single-surface CLI (build dist once, then deploy):
#   VITE_APP_SURFACE=console VITE_API_BASE_URL=https://api.memorynode.ai pnpm --filter @memorynode/dashboard build
#   pnpm exec wrangler pages deploy apps/dashboard/dist --project-name=memorynode-console
#
# Client-side routes: public/_redirects includes `/* /index.html 200` so /lab and /api-keys work on refresh.

name = "memorynode-console"
pages_build_output_dir = "./dist"
