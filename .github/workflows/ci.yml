# yaml-language-server: disable
name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (critical only; high tracked)
        run: |
          set +e
          audit_output="$(pnpm audit --audit-level=critical 2>&1)"
          audit_exit=$?
          set -e
          printf '%s\n' "$audit_output"
          if [ "$audit_exit" -ne 0 ]; then
            if printf '%s\n' "$audit_output" | grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" && printf '%s\n' "$audit_output" | grep -qi "endpoint.*retired"; then
              echo "pnpm audit endpoint-retired error tolerated in CI."
            else
              exit "$audit_exit"
            fi
          fi

      - name: Secret scan (tracked files)
        run: pnpm secrets:check:tracked -- --ci

      - name: Secret scan (tracked + commit diff)
        env:
          SCAN_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          SCAN_HEAD: ${{ github.sha }}
        run: pnpm secrets:check -- --ci --base "$SCAN_BASE" --head "$SCAN_HEAD"

      - name: Migration docs/sequence guard
        run: pnpm migrations:check

      - name: Workspace tenant scope guard
        run: pnpm check:workspace-scope

      - name: Service-role allowlist guard
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          DIFF_HEAD: ${{ github.sha }}
          PR_BODY: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}
        run: pnpm check:service-role-allowlist

      - name: Request-path least-privilege guard
        run: pnpm check:request-path-least-privilege

      - name: Observability contracts guard
        run: pnpm check:observability-contracts

      - name: Incident runbook contract guard
        run: pnpm check:runbooks

      - name: Least-privilege contract guard
        run: pnpm check:least-privilege

      - name: Check docs billing (PayU)
        run: pnpm check:docs-billing

      - name: Economics release gate
        run: pnpm check:economics-gate

      - name: CI trust gates (G1–G5)
        run: pnpm ci:trust-gates

      - name: Workspace script guard
        run: pnpm check:workspace-scripts

      - name: Tracked runtime artifact guard
        run: pnpm check:tracked-artifacts

      - name: Validate script syntax
        run: |
          bash -n scripts/verify_e2e.sh
          node --check scripts/check_docs_drift.mjs
          node --check scripts/apply_doc_banners.mjs
          node --check scripts/verify_staging.mjs
          node --check scripts/beta_verify.mjs
          node --check scripts/dashboard_build_prod_surfaces.mjs
          node --check scripts/deploy_dashboard_pages.mjs
          node --check scripts/verify_dashboard_pages_deploy.mjs
          node --check scripts/dashboard_deploy_sha.mjs
          node --check examples/node-quickstart/index.mjs
          node --check examples/support-bot-minimal/index.mjs
          node --check examples/nextjs-middleware/demo.mjs
          node --check examples/langchain-wrapper/demo.mjs
          pwsh -NoProfile -Command '
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile("scripts/verify_e2e.ps1", [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
          '

      - name: E2E log redaction guard
        run: |
          output="$(E2E_MASK_SELF_TEST=1 pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify_e2e.ps1 2>&1)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -E 'mn_live_[A-Za-z0-9_-]{10,}' >/dev/null; then
            echo "Token leak detected in verify_e2e.ps1 output"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          VITE_API_BASE_URL: https://api.memorynode.ai
          VITE_APP_SURFACE: console
          VITE_BUILD_SHA: ${{ github.sha }}
        run: pnpm -w build

      - name: Dashboard quality gates (CSP/a11y/perf)
        run: pnpm check:dashboard-quality

      - name: OpenAPI spec drift check
        run: pnpm openapi:check

      - name: Docs drift guard (truth docs vs API, SDK, MCP, worker)
        env:
          DOCS_DRIFT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          DOCS_DRIFT_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PR_BODY: ${{ github.event_name == 'pull_request' && github.event.pull_request.body || '' }}
        run: node scripts/check_docs_drift.mjs

      - name: Test (with coverage)
        env:
          VITE_API_BASE_URL: https://api.memorynode.ai
          VITE_APP_SURFACE: console
          VITE_BUILD_SHA: ${{ github.sha }}
        run: pnpm test:coverage

  db-migration-drift:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration drift test (fresh + partial DB)
        env:
          MIGRATION_TEST_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm db:drift:test

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages for API bundle (smoke)
        run: |
          pnpm --filter @memorynodeai/shared build
          pnpm --filter @memorynodeai/mcp-core build

      - name: Run smoke
        env:
          EMBEDDINGS_MODE: stub
          PORT: 8787
        run: pnpm smoke:ci

  release-safety-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release gate (canonical)
        env:
          CHECK_ENV: staging
          CHECK_CONFIG_MODE: ci
          SUPABASE_URL: https://memorynode-ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci_supabase_service_role_key_value
          SUPABASE_ACCESS_MODE: rls-first
          REQUEST_SCOPED_DB_ENABLED: "1"
          DISABLE_SERVICE_ROLE_REQUEST_PATH: "1"
          SUPABASE_ANON_KEY: ci_supabase_anon_key_value
          SUPABASE_JWT_SECRET: ci_supabase_jwt_secret_value
          API_KEY_SALT: ci_api_key_salt_value
          MASTER_ADMIN_TOKEN: ci_master_admin_token_value
          DATABASE_URL: postgresql://ci_user:ci_pass@ci-db.invalid:5432/memorynode?sslmode=require
          EMBEDDINGS_MODE: stub
          BILLING_WEBHOOKS_ENABLED: "0"
        run: pnpm release:gate

      - name: Production config assertions
        env:
          CHECK_ENV: production
          CHECK_CONFIG_MODE: ci
          SUPABASE_URL: https://memorynode-ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci_supabase_service_role_key_value
          SUPABASE_ANON_KEY: ci_supabase_anon_key_value
          SUPABASE_JWT_SECRET: ci_supabase_jwt_secret_value
          SUPABASE_ACCESS_MODE: rls-first
          REQUEST_SCOPED_DB_ENABLED: "1"
          DISABLE_SERVICE_ROLE_REQUEST_PATH: "1"
          ALLOWED_ORIGINS: https://console.memorynode.ai,https://app.memorynode.ai
          API_KEY_SALT: ci_api_key_salt_value
          MASTER_ADMIN_TOKEN: ci_master_admin_token_value
          DATABASE_URL: postgresql://ci_user:ci_pass@ci-db.invalid:5432/memorynode?sslmode=require
          EMBEDDINGS_MODE: openai
          OPENAI_API_KEY: ci_openai_key_value
          AI_COST_BUDGET_INR: "100"
          BILLING_WEBHOOKS_ENABLED: "0"
        run: pnpm check:config

      - name: Check example envs are empty
        run: node scripts/check_examples_no_values.mjs

      - name: Prod gate self-test (must fail on forced command error)
        run: pnpm prod:gate:self-test

      - name: Prod gate dry-run
        if: "${{ hashFiles('.env.gate') != '' }}"
        env:
          DRY_RUN: "1"
          CHECK_ENV: "staging"
        run: pnpm prod:gate

      - name: Prod gate dry-run skipped
        if: "${{ hashFiles('.env.gate') == '' }}"
        run: |
          echo "Skipping prod gate dry-run: .env.gate not found in CI."
