name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@latest-10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@latest-10 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check required secrets
        id: secrets_check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_KEY_SALT: ${{ secrets.API_KEY_SALT }}
          MASTER_ADMIN_TOKEN: ${{ secrets.MASTER_ADMIN_TOKEN }}
        run: |
          missing=()
          [[ -z "$SUPABASE_URL" ]] && missing+=("SUPABASE_URL")
          [[ -z "$SUPABASE_SERVICE_ROLE_KEY" ]] && missing+=("SUPABASE_SERVICE_ROLE_KEY")
          [[ -z "$API_KEY_SALT" ]] && missing+=("API_KEY_SALT")
          [[ -z "$MASTER_ADMIN_TOKEN" ]] && missing+=("MASTER_ADMIN_TOKEN")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "All required secrets are present."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Missing secrets: ${missing[*]}. Smoke tests will be skipped."
          fi

      - name: Run smoke
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_KEY_SALT: ${{ secrets.API_KEY_SALT }}
          MASTER_ADMIN_TOKEN: ${{ secrets.MASTER_ADMIN_TOKEN }}
          EMBEDDINGS_MODE: stub
          PORT: 8787
        run: pnpm smoke:ci
