name: E2E Smoke (manual)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install deps
        run: corepack pnpm install --frozen-lockfile

      - name: Check required secrets
        id: secrets_check
        env:
          MEMORYNODE_API_KEY: ${{ secrets.MEMORYNODE_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          missing=()
          [[ -z "$MEMORYNODE_API_KEY" ]] && missing+=("MEMORYNODE_API_KEY")
          [[ -z "$BASE_URL" ]] && missing+=("BASE_URL")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "All required secrets are present."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Missing secrets: ${missing[*]}. E2E smoke will be skipped."
          fi

      - name: E2E smoke
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        env:
          MEMORYNODE_API_KEY: ${{ secrets.MEMORYNODE_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          EMBEDDINGS_MODE: stub
        run: |
          chmod +x scripts/e2e_smoke.sh
          ./scripts/e2e_smoke.sh

      - name: Skip notice
        if: ${{ steps.secrets_check.outputs.has_secrets != 'true' }}
        run: 'echo "Skipping e2e smoke: secrets missing (manual-only workflow)."'
