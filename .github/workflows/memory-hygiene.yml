# yaml-language-server: disable
# Weekly memory-hygiene dry-run. Calls POST /admin/memory-hygiene with dry_run=true.
# Required repo secrets: MEMORY_HYGIENE_ADMIN_TOKEN, MEMORY_HYGIENE_WORKSPACE_ID
# Optional override: set BASE_URL in job env (default https://api.memorynode.ai)
name: Memory hygiene (dry-run)

on:
  schedule:
    - cron: "0 2 * * 1"  # Mondays 02:00 UTC
  workflow_dispatch:      # Allow manual run

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Memory hygiene dry-run
        env:
          TOKEN: ${{ secrets.MEMORY_HYGIENE_ADMIN_TOKEN }}
          WORKSPACE_ID: ${{ secrets.MEMORY_HYGIENE_WORKSPACE_ID }}
        run: |
          if [[ -z "$TOKEN" || -z "$WORKSPACE_ID" ]]; then
            echo "Skipping: set MEMORY_HYGIENE_ADMIN_TOKEN and MEMORY_HYGIENE_WORKSPACE_ID in repo secrets to enable."
            exit 0
          fi
          base="${BASE_URL:-https://api.memorynode.ai}"
          url="${base%/}/admin/memory-hygiene?workspace_id=${WORKSPACE_ID}&dry_run=true&limit=200"
          echo "Calling API at ${base%/}/admin/memory-hygiene (workspace_id=***, dry_run=true)."
          out=$(curl -sS -w "\nHTTP_CODE:%{http_code}" -X POST -H "x-admin-token: $TOKEN" --connect-timeout 30 --max-time 60 "$url") || true
          code=$(echo "$out" | sed -n 's/.*HTTP_CODE:\([0-9]*\)/\1/p')
          echo "$out" | sed 's/HTTP_CODE:.*/HTTP_CODE:<redacted>/'
          if [[ -z "$code" || "$code" = "000" ]]; then
            echo "Result: API unreachable (connection failed or timeout). Set repo secret MEMORY_HYGIENE_BASE_URL if your API is at a different URL."
            exit 1
          fi
          if [[ "$code" -ge 200 && "$code" -lt 300 ]]; then
            echo "Result: Dry-run completed successfully (HTTP $code)."
            exit 0
          fi
          echo "Result: API returned HTTP $code. Check token, workspace_id, and MEMORY_HYGIENE_BASE_URL."
          exit 1
