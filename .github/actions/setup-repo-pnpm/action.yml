# Composite: checkout + Node 20 + pnpm 10 + frozen install (used by release workflows).
name: Setup repo (pnpm)
description: Checkout ref, install dependencies with pnpm --frozen-lockfile
inputs:
  ref:
    description: Git ref (SHA, branch, or tag) to checkout
    required: true
runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: "20"
        package-manager-cache: false

    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Prepare pnpm
      shell: bash
      run: corepack prepare pnpm@10.0.0 --activate

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
