# yaml-language-server: disable
name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit (critical only; high tracked)
        run: pnpm audit --audit-level=critical

      - name: Secret scan (tracked files)
        run: pnpm secrets:check:tracked -- --ci

      - name: Secret scan (tracked + commit diff)
        env:
          SCAN_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          SCAN_HEAD: ${{ github.sha }}
        run: pnpm secrets:check -- --ci --base "$SCAN_BASE" --head "$SCAN_HEAD"

      - name: Migration docs/sequence guard
        run: pnpm migrations:check

      - name: Check docs billing (PayU)
        run: pnpm check:docs-billing

      - name: CI trust gates (G1–G5)
        run: pnpm ci:trust-gates

      - name: Workspace script guard
        run: pnpm check:workspace-scripts

      - name: Tracked runtime artifact guard
        run: pnpm check:tracked-artifacts

      - name: Validate script syntax
        run: |
          bash -n scripts/verify_e2e.sh
          node --check scripts/verify_staging.mjs
          node --check scripts/beta_verify.mjs
          node --check examples/node-quickstart/index.mjs
          node --check examples/nextjs-middleware/demo.mjs
          node --check examples/langchain-wrapper/demo.mjs
          pwsh -NoProfile -Command '
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile("scripts/verify_e2e.ps1", [ref]$tokens, [ref]$errors)
            if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
            }
          '

      - name: E2E log redaction guard
        run: |
          output="$(E2E_MASK_SELF_TEST=1 pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/verify_e2e.ps1 2>&1)"
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -E 'mn_live_[A-Za-z0-9_-]{10,}' >/dev/null; then
            echo "Token leak detected in verify_e2e.ps1 output"
            exit 1
          fi

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          VITE_API_BASE_URL: https://api.memorynode.ai
        run: pnpm -w build

      - name: OpenAPI spec drift check
        run: pnpm openapi:check

      - name: Test (with coverage)
        env:
          VITE_API_BASE_URL: https://api.memorynode.ai
        run: pnpm test:coverage

  db-migration-drift:
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration drift test (fresh + partial DB)
        env:
          MIGRATION_TEST_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: pnpm db:drift:test

  smoke:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @memorynodeai/shared build

      - name: Run smoke
        env:
          EMBEDDINGS_MODE: stub
          PORT: 8787
        run: pnpm smoke:ci

  release-safety-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release gate (canonical)
        env:
          CHECK_ENV: staging
          CHECK_CONFIG_MODE: ci
          SUPABASE_URL: https://memorynode-ci.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci_supabase_service_role_key_value
          API_KEY_SALT: ci_api_key_salt_value
          MASTER_ADMIN_TOKEN: ci_master_admin_token_value
          DATABASE_URL: postgresql://ci_user:ci_pass@ci-db.invalid:5432/memorynode?sslmode=require
          EMBEDDINGS_MODE: stub
          BILLING_WEBHOOKS_ENABLED: "0"
        run: pnpm release:gate

      - name: Check example envs are empty
        run: node scripts/check_examples_no_values.mjs

      - name: Prod gate self-test (must fail on forced command error)
        run: pnpm prod:gate:self-test

      - name: Prod gate dry-run
        if: "${{ hashFiles('.env.gate') != '' }}"
        env:
          DRY_RUN: "1"
          CHECK_ENV: "staging"
        run: pnpm prod:gate

      - name: Prod gate dry-run skipped
        if: "${{ hashFiles('.env.gate') == '' }}"
        run: |
          echo "Skipping prod gate dry-run: .env.gate not found in CI."
