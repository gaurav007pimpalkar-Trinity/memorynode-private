# Cloudflare Pages shared frontend config.
# Deploy console: pnpm --filter @memorynode/dashboard build && pnpm --filter @memorynode/dashboard exec wrangler pages deploy dist --project-name=memorynode-console
# Deploy founder app: pnpm --filter @memorynode/dashboard build && pnpm --filter @memorynode/dashboard exec wrangler pages deploy dist --project-name=memorynode-app
# Use VITE_APP_SURFACE=console for console.memorynode.ai and VITE_APP_SURFACE=app for app.memorynode.ai.

name = "memorynode-console"
pages_build_output_dir = "./dist"
