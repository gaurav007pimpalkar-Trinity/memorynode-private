# yaml-language-server: disable
# Ad hoc remote E2E (secrets: BASE_URL, MEMORYNODE_API_KEY). Normal releases run E2E in release_staging.yml.
name: E2E Smoke (manual)

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      # Match CI / Release Staging so lockfile + packageManager (pnpm@10.0.0) resolve consistently.
      - name: Prepare pnpm
        run: corepack prepare pnpm@10.0.0 --activate

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Ensure jq (verify_e2e.sh)
        run: command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq)

      - name: Check required secrets
        id: secrets_check
        env:
          MEMORYNODE_API_KEY: ${{ secrets.MEMORYNODE_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          missing=()
          [[ -z "$MEMORYNODE_API_KEY" ]] && missing+=("MEMORYNODE_API_KEY")
          [[ -z "$BASE_URL" ]] && missing+=("BASE_URL")
          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "All required secrets are present."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Missing secrets: ${missing[*]}. E2E smoke will be skipped."
          fi

      - name: E2E smoke
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        env:
          MEMORYNODE_API_KEY: ${{ secrets.MEMORYNODE_API_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
          EMBEDDINGS_MODE: stub
        run: |
          chmod +x scripts/verify_e2e.sh
          ./scripts/verify_e2e.sh

      - name: Skip notice
        if: ${{ steps.secrets_check.outputs.has_secrets != 'true' }}
        run: 'echo "Skipping e2e smoke: secrets missing (manual-only workflow)."'
