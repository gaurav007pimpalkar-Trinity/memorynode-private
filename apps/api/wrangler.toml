name = "memorynode-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
tsconfig = "tsconfig.json"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[dev]
port = 8787

[durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" },
  { name = "CIRCUIT_BREAKER_DO", class_name = "CircuitBreakerDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["CircuitBreakerDO"]

[env.staging]
name = "memorynode-api-staging"
routes = [
  { pattern = "api-staging.memorynode.ai/*", zone_name = "memorynode.ai" },
]
[env.staging.durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" },
  { name = "CIRCUIT_BREAKER_DO", class_name = "CircuitBreakerDO" }
]

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = ["CircuitBreakerDO"]

[env.staging.vars]
EMBEDDINGS_MODE = "openai"
ENVIRONMENT = "staging"
RATE_LIMIT_MODE = "on"
BILLING_RECONCILE_ON_AMBIGUITY = "0"
BILLING_WEBHOOKS_ENABLED = "0"
RATE_LIMIT_MAX = "60"
RATE_LIMIT_WINDOW_MS = "60000"
WORKSPACE_CONCURRENCY_MAX = "8"
WORKSPACE_CONCURRENCY_TTL_MS = "30000"
WORKSPACE_COST_PER_MINUTE_CAP_INR = "15"

[env.production]
name = "memorynode-api"
routes = [
  { pattern = "api.memorynode.ai/*", zone_name = "memorynode.ai" },
  { pattern = "mcp.memorynode.ai/*", zone_name = "memorynode.ai" }
]
[env.production.durable_objects]
bindings = [
  { name = "RATE_LIMIT_DO", class_name = "RateLimitDO" },
  { name = "CIRCUIT_BREAKER_DO", class_name = "CircuitBreakerDO" }
]

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimitDO"]

[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["CircuitBreakerDO"]

[env.production.vars]
EMBEDDINGS_MODE = "openai"
ENVIRONMENT = "production"
RATE_LIMIT_MODE = "on"
BILLING_RECONCILE_ON_AMBIGUITY = "1"
BILLING_WEBHOOKS_ENABLED = "1"
RATE_LIMIT_MAX = "60"
RATE_LIMIT_WINDOW_MS = "60000"
WORKSPACE_CONCURRENCY_MAX = "8"
WORKSPACE_CONCURRENCY_TTL_MS = "30000"
WORKSPACE_COST_PER_MINUTE_CAP_INR = "15"
